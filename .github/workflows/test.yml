name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-config-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build the autoremove-torrents Docker image
        run: docker build -t autoremove-torrents-test .

      - name: Test execution and config generation
        run: |
          docker run --name test-container -d \
            -e PUID=1000 \
            -e PGID=1000 \
            -e INTERVAL=5 \
            -e ART_MY_CLIENT__HOST=1.2.3.4 \
            -e ART_MY_CLIENT__USERNAME=admin \
            -e ART_MY_CLIENT__PASSWORD=password123 \
            -e ART_MY_CLIENT__SOME_FLAG=true \
            autoremove-torrents-test

          echo "Waiting for container to start and generate config..."
          sleep 5

          echo "Checking generated config..."
          # The temp config is generated at /tmp/config.yml
          docker exec test-container cat /tmp/config.yml > generated_config.yml
          
          echo "Generated Config Contents:"
          cat generated_config.yml
          
          # Assertions
          grep -q "my_client:" generated_config.yml || (echo "Missing my_client block" && exit 1)
          grep -q "host: 1.2.3.4" generated_config.yml || (echo "Missing host" && exit 1)
          grep -q "username: admin" generated_config.yml || (echo "Missing username" && exit 1)
          grep -q "password: password123" generated_config.yml || (echo "Missing password" && exit 1)
          grep -q "some_flag: true" generated_config.yml || (echo "Missing boolean flag" && exit 1)
          
          echo "Config generation tests passed successfully!"

      - name: Test process execution logs
        run: |
          echo "Checking container logs for successful execution..."
          # Since the config is invalid for the real autoremove-torrents binary (missing type/client variables),
          # we just verify that it successfully attempted to run and output the expected starting sequence.
          logs=$(docker logs test-container)
          echo "$logs"
          
          if ! echo "$logs" | grep -q "Starting autoremove-torrents loop..."; then
            echo "Failed: Did not find launch string in logs."
            exit 1
          fi
          
          if ! echo "$logs" | grep -q "Loading configurations..."; then
            echo "Failed: autoremove-torrents binary did not execute."
            exit 1
          fi
          
          echo "Process execution tests passed successfully!"

      - name: Cleanup
        if: always()
        run: docker rm -f test-container || true
